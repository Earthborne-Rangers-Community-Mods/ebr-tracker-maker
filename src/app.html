<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Earthborne Rangers Campaign Tracker Maker</title>
    <style>
      @font-face {
        font-family: "Ikarius ADF No2";
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        src: url("%sveltekit.assets%/fonts/IkariusADFNo2Std-Regular.otf") format("opentype");
      }
      @font-face {
        font-family: "Ikarius ADF No2";
        font-weight: 700;
        font-style: normal;
        font-display: swap;
        src: url("%sveltekit.assets%/fonts/IkariusADFNo2Std-Bold.otf") format("opentype");
      }
      @font-face {
        font-family: "Ikarius ADF No2";
        font-weight: 400;
        font-style: italic;
        font-display: swap;
        src: url("%sveltekit.assets%/fonts/IkariusADFNo2Std-Italic.otf") format("opentype");
      }
      @font-face {
        font-family: "Ikarius ADF No2";
        font-weight: 700;
        font-style: italic;
        font-display: swap;
        src: url("%sveltekit.assets%/fonts/IkariusADFNo2Std-BoldItalic.otf") format("opentype");
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
